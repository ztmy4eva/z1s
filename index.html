<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ZUTOMAYO CARD </title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 상단 바 -->
  <header class="top-bar">
    <div class="seasons">
      <button onclick="filterSeason('1', this)">시즌1</button>
      <button onclick="filterSeason('2', this)">시즌2</button>
      <button onclick="filterSeason('3', this)">시즌3</button>
      <button onclick="filterSeason('4', this)">시즌4</button>
    </div>

    <input type="text" placeholder="카드 검색" />
  </header>

  <div class="container">

    <!-- 왼쪽 필터 -->
    <aside class="sidebar">
      <h3>전체</h3>

      <h4>캐릭터 카드</h4>
      <ul>
        <button onclick="filterRarity('UR', this)">UR</button>
        <button onclick="filterRarity('SR', this)">SR</button>
        <button onclick="filterRarity('R', this)">R</button>
        <button onclick="filterRarity('N', this)">N</button>
        <button onclick="filterRarity('SE', this)">SE</button>
      </ul>

      <h4>인챈트 카드</h4>
      <ul>
        <button onclick="filterRarity('UR', this)">UR</button>
        <button onclick="filterRarity('SR', this)">SR</button>
        <button onclick="filterRarity('R', this)">R</button>
        <button onclick="filterRarity('N', this)">N</button>
      </ul>
    </aside>

    <!-- 카드 영역 -->
    <main class="card-grid">
      <img src="cards/zutomayocard_1st_1.png" class="card" data-season="1" data-rarity="UR" />
      <img src="cards/zutomayocard_1st_2.png" class="card" data-season="2" data-rarity="SR" />
      <img src="cards/zutomayocard_1st_3.png" class="card" data-season="3" data-rarity="R" />
      <img src="cards/zutomayocard_1st_4.png" class="card" data-season="4" data-rarity="N" />
    </main>

  </div>


<script>
  let currentSeason = 'all';
  let currentRarity = 'all';

  function applyFilter() {
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      const matchSeason =
        currentSeason === 'all' || card.dataset.season === currentSeason;

      const matchRarity =
        currentRarity === 'all' || card.dataset.rarity === currentRarity;

      card.style.display =
        matchSeason && matchRarity ? 'inline-block' : 'none';
    });
  }

  function clearActive(groupSelector) {
    document
      .querySelectorAll(groupSelector)
      .forEach(btn => btn.classList.remove('active'));
  }

  // ✅ 시즌: 무조건 선택
  function filterSeason(season, button) {
    currentSeason = season;
    clearActive('.seasons button');
    button.classList.add('active');
    applyFilter();
  }

  // ✅ 레어도: 토글
  function filterRarity(rarity, button) {
    if (button.classList.contains('active')) {
      button.classList.remove('active');
      currentRarity = 'all';
    } else {
      clearActive('.sidebar button');
      button.classList.add('active');
      currentRarity = rarity;
    }
    applyFilter();
  }
</script>


  </body>
</html>
