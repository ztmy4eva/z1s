<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZUTOMAYO CARD 한글 번역 </title>
  <link rel="icon" href="cards/favicon.png" />
  <link rel="apple-touch-icon" href="cards/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-bar">
    <div class="top-left">
      <button onclick="showOverview(this)" class="active">개요</button>
      <button onclick="showSeason('1', this)">시즌1</button>
      <button onclick="showSeason('2', this)">시즌2</button>
      <button onclick="showSeason('3', this)">시즌3</button>
      <button onclick="showSeason('4', this)">시즌4</button>
      <button class="collection-tab" onclick="showCollection(this)">컬렉션</button>
      <a class="buy-btn" href="https://zutomayomart.net/product/list?tag_codes=ZMT-T-014" target="_blank" rel="noopener">즛카드 구매</a>
    </div>
  </header>

  <!-- Collection sub-bar (progress + account, shown only in collection mode) -->
  <div id="collTopBar" class="coll-sub-bar" style="display:none">
    <!-- Left: view toggle + progress + search -->
    <div class="coll-left">
      <div class="collection-progress" id="collectionProgress"></div>
      <button class="summary-tab-btn" onclick="showSummary()">📋 요약</button>
      <div class="coll-search-wrap" id="collSearchWrap">
        <input id="cardSearch" type="search" placeholder="카드 이름 검색…" autocomplete="off" oninput="renderCards()" />
      </div>
    </div>

    <!-- Right: account area -->
    <div class="coll-acct-area">

      <!-- Logged-out -->
      <div id="acctLoggedOut" class="acct-bar">
        <button class="code-btn cloud-btn" onclick="showAcctPanel('create')">계정 만들기</button>
        <button class="code-btn" onclick="showAcctPanel('login')">로그인</button>
        <span id="copyFeedback"></span>
      </div>

      <!-- Logged-in -->
      <div id="acctLoggedIn" class="acct-bar" style="display:none">
        <div class="acct-id-chip" onclick="copyAcctId()" title="클릭하여 ID 복사">
          <span class="acct-id-label">ID</span>
          <code id="acctIdText"></code>
        </div>
        <div id="syncStatus" class="sync-status sync-ok">동기화됨</div>
        <span id="copyFeedback2" class="acct-copy-feedback"></span>
        <button class="code-btn compare-btn" onclick="toggleCompareInput()">비교 / 교환</button>
        <div class="acct-icon-group">
          <button class="acct-icon-btn" onclick="shareLink()" title="링크 복사">🔗</button>
          <button class="acct-icon-btn" onclick="printCollection()" title="PDF 출력">🖨</button>
          <button class="acct-icon-btn" onclick="showAcctPanel('settings')" title="설정">⚙</button>
        </div>
      </div>

      <!-- Dropdown panels (create / login / settings) -->
      <div id="acctPanel" class="acct-panel" style="display:none">
        <!-- CREATE -->
        <div id="panelCreate" class="acct-panel-inner" style="display:none">
          <h4>계정 만들기</h4>
          <p class="acct-hint">영문·숫자 3~16자 ID와 숫자 4자리 PIN으로 계정을 만듭니다</p>
          <label>ID (영문·숫자, 3~16자) <input id="createId" type="text" maxlength="16" placeholder="myid123" autocomplete="off" /></label>
          <label>PIN (숫자 4자리) <input id="createPin" type="password" inputmode="numeric" maxlength="4" pattern="\d{4}" placeholder="1234" /></label>
          <label>PIN 확인 <input id="createPinConfirm" type="password" inputmode="numeric" maxlength="4" pattern="\d{4}" placeholder="1234" /></label>
          <div class="acct-actions">
            <button class="code-btn apply-btn" onclick="acctCreate()">만들기</button>
            <button class="code-btn" onclick="hideAcctPanel()">취소</button>
          </div>
          <p id="createError" class="acct-error"></p>
        </div>
        <!-- LOGIN -->
        <div id="panelLogin" class="acct-panel-inner" style="display:none">
          <h4>로그인</h4>
          <p class="acct-hint">다른 기기에서 만든 계정의 ID와 PIN을 입력하세요</p>
          <label>ID <input id="loginId" type="text" maxlength="16" spellcheck="false" autocomplete="off" placeholder="myid123" /></label>
          <label>PIN <input id="loginPin" type="password" inputmode="numeric" maxlength="4" pattern="\d{4}" placeholder="1234" /></label>
          <div class="acct-actions">
            <button class="code-btn apply-btn" onclick="acctLogin()">로그인</button>
            <button class="code-btn" onclick="hideAcctPanel()">취소</button>
          </div>
          <p id="loginError" class="acct-error"></p>
        </div>
        <!-- SETTINGS -->
        <div id="panelSettings" class="acct-panel-inner" style="display:none">
          <h4>계정 설정</h4>
          <div class="acct-setting-row">
            <span>내 ID</span>
            <code id="settingsId"></code>
          </div>
          <div class="acct-actions">
            <button class="code-btn" onclick="copyMissingList()">📋 미보유 목록 복사</button>
            <button class="code-btn clear-btn" onclick="clearAll()">전체 초기화</button>
            <button class="code-btn" onclick="acctLogout()">로그아웃</button>
            <button class="code-btn" onclick="hideAcctPanel()">닫기</button>
          </div>
        </div>
      </div>

      <!-- Compare input dropdown -->
      <div id="compareInputArea" class="acct-panel" style="display:none">
        <div class="acct-panel-inner">
          <h4>비교 / 교환</h4>
          <p class="acct-hint">상대방의 ID 또는 컬렉션 코드를 입력하세요</p>
          <input id="codeInput" type="text" spellcheck="false" placeholder="ID 또는 컬렉션 코드" />
          <div class="acct-actions">
            <button class="code-btn apply-btn" onclick="startCompare()">비교</button>
            <button class="code-btn" onclick="hideCompareInput()">취소</button>
          </div>
          <span id="importFeedback" class="acct-error"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile view banner (viewing someone else's collection) -->
  <div id="profileBanner" style="display:none">
    <span class="shared-label" id="profileLabel">컬렉션 보기</span>
    <div class="shared-actions">
      <button class="code-btn apply-btn" onclick="compareWithProfile()">내 컬렉션과 비교</button>
      <button class="code-btn" onclick="exitProfile()">돌아가기</button>
    </div>
  </div>

  <!-- Compare mode banner -->
  <div id="compareBanner" style="display:none">
    <span class="shared-label">컬렉션 비교 중</span>
    <div class="compare-stats" id="compareStats"></div>
    <div class="shared-actions">
      <button class="code-btn" id="compareFilterBtn" onclick="cycleCompareFilter()">전체 보기</button>
      <button class="code-btn" onclick="shareCmpLink()">🔗 링크 복사</button>
      <button class="code-btn" onclick="exitCompare()">비교 종료</button>
    </div>
  </div>

  <!-- Trade summary panel -->
  <div id="tradeSummary" style="display:none">
    <div class="trade-section">
      <h3 class="trade-title trade-need">상대방이 보유 &rarr; 내가 필요</h3>
      <div class="trade-cards" id="tradeNeed"></div>
    </div>
    <div class="trade-section">
      <h3 class="trade-title trade-offer">내 여분 &rarr; 상대방이 필요</h3>
      <div class="trade-cards" id="tradeOffer"></div>
    </div>
    <div class="trade-section" id="tradeMatchSection" style="display:none">
      <h3 class="trade-title trade-match">교환 추천</h3>
      <div class="trade-matches" id="tradeMatches"></div>
    </div>
  </div>

  <div class="container">

    <aside class="sidebar disabled" id="sidebar">
      <!-- Collection season picker (collection mode only, at top) -->
      <div id="collSeasonNav" style="display:none">
        <h3>시즌</h3>
        <button class="coll-season-btn active" onclick="setCollectionSeason('1', this)">시즌1</button>
        <button class="coll-season-btn" onclick="setCollectionSeason('2', this)">시즌2</button>
        <button class="coll-season-btn" onclick="setCollectionSeason('3', this)">시즌3</button>
        <button class="coll-season-btn" onclick="setCollectionSeason('4', this)">시즌4</button>
        <hr />
      </div>
      <!-- Ownership filter (collection mode only) -->
      <div id="ownership-section" style="display:none">
        <h3>보유 여부</h3>
        <button class="ownership-btn" id="own-btn-owned"    onclick="filterOwnership('owned', this)">보유</button>
        <button class="ownership-btn" id="own-btn-unowned"  onclick="filterOwnership('unowned', this)">미보유</button>
        <button class="ownership-btn" id="own-btn-wishlist" onclick="filterOwnership('wishlist', this)">⭐ 위시리스트</button>
        <hr />
      </div>
      <h3>카드 종류</h3>
      <button class="type-btn" onclick="filterType('character', this)">캐릭터 카드</button>
      <button class="type-btn" onclick="filterType('enchant', this)">인챈트 카드</button>
      <button class="type-btn" onclick="filterType('area-enchant', this)">에어리어 인챈트 카드</button>
      <hr />
      <h3>등급</h3>
      <button class="rarity-btn" onclick="filterRarity('UR', this)">UR</button>
      <button class="rarity-btn" onclick="filterRarity('SR', this)">SR</button>
      <button class="rarity-btn" onclick="filterRarity('R', this)">R</button>
      <button class="rarity-btn" onclick="filterRarity('N', this)">N</button>
      <button class="rarity-btn" onclick="filterRarity('SE', this)">SE</button>
    </aside>

      <div class="main-area">
        <div id="overview">
          <div style="display:flex;flex-direction:column;align-items:center">
            <img src="cards/zc123.png" class="overview-image">
            <button class="overview-likes-btn" onclick="showLikesRanking()">❤️ 인기 카드 TOP 10</button>
          </div>
        </div>
        <main class="card-grid" id="cardGrid"></main>
        <div id="summaryView" style="display:none"></div>
      </div>

  </div>

  <!-- 모달 -->
  <div id="cardModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content">
      <img id="modalImage" />
      <div class="modal-info">
        <table class="card-table">
          <tbody id="modalBody"></tbody>
        </table>
        <div class="modal-like-section">
          <button class="like-btn" id="likeBtn" onclick="likeCard()">❤️ <span id="likeCount">…</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hover preview (browse mode) -->
  <div id="hoverPreview" class="hover-preview"></div>

  <!-- Likes ranking overlay -->
  <div id="likesRanking" class="likes-ranking-overlay" style="display:none">
    <div class="likes-ranking-inner">
      <h2>❤️ 인기 카드 TOP 10</h2>
      <div id="likesRankList" class="likes-rank-list"></div>
      <button class="likes-rank-close" onclick="document.getElementById('likesRanking').style.display='none'">닫기</button>
    </div>
  </div>

  <script src="cards.js"></script>
  <script>
    let viewMode         = 'overview';
    let currentSeason    = 'all';
    let collSeason       = '1';
    let currentRarity    = 'all';
    let currentType      = 'all';
    let currentOwnership = 'all';
    let compareCards      = null;   // Map<src, count> of the other user
    let compareFilter     = 'all';  // 'all' | 'need' | 'offer' | 'both'
    let isProfileView     = false;  // viewing someone else's collection (read-only)
    let cmpPartnerId      = null;   // last compared partner ID
    let summaryTemplate   = localStorage.getItem('zc_sv_tpl') || 'default';
    let _currentModalSrc  = null;   // currently open modal card src

    // ── Wishlist ─────────────────────────────────────────────
    let wishlist = new Set(JSON.parse(localStorage.getItem('zc_wishlist') || '[]'));
    function saveWishlist() {
      localStorage.setItem('zc_wishlist', JSON.stringify([...wishlist]));
    }
    function isWished(src) { return wishlist.has(src); }

    let ownedCards = (() => {
      const raw = JSON.parse(localStorage.getItem('zc_owned') || 'null');
      if (!raw) return new Map();
      if (Array.isArray(raw)) return new Map(raw.map(src => [src, 1]));
      return new Map(Object.entries(raw).map(([src, n]) => [src, Number(n)]));
    })();

    function saveOwned() {
      const obj = {};
      ownedCards.forEach((n, src) => { if (n > 0) obj[src] = n; });
      localStorage.setItem('zc_owned', JSON.stringify(obj));
      if (typeof scheduleSync === 'function') scheduleSync();
    }
    function isOwned(src)  { return (ownedCards.get(src) || 0) > 0; }
    function getCount(src) { return ownedCards.get(src) || 0; }

    const grid      = document.getElementById('cardGrid');
    const sidebar   = document.getElementById('sidebar');
    const overview  = document.getElementById('overview');

    // ── Hover preview ────────────────────────────────────────
    function showHoverPreview(c, el) {
      if (window.innerWidth <= 768) return;
      const hp = document.getElementById('hoverPreview');
      hp.innerHTML = `<img src="${c.src}" alt="${c.name}">`;
      hp.classList.add('visible');
      const rect = el.getBoundingClientRect();
      const PW = 500, PH = 700;
      let left = rect.right + 10;
      let top  = rect.top;
      if (left + PW > window.innerWidth)  left = rect.left - PW - 10;
      if (left < 0) left = 10;
      if (top + PH > window.innerHeight)  top = window.innerHeight - PH - 10;
      if (top < 0) top = 10;
      hp.style.left = left + 'px';
      hp.style.top  = top  + 'px';
    }
    function hideHoverPreview() {
      document.getElementById('hoverPreview').classList.remove('visible');
    }

    // ── Render ─────────────────────────────────────────────
    function renderCards() {
      const isCollView   = viewMode === 'collection';
      const isCompare    = isCollView && compareCards !== null;
      const activeSeason = isCollView ? collSeason : currentSeason;
      const frag = document.createDocumentFragment();

      const searchEl = document.getElementById('cardSearch');
      const searchQ  = searchEl ? searchEl.value.trim().toLowerCase() : '';

      // Collect matching cards first, then sort
      const matchingCards = [];
      for (const c of CARDS) {
        if (activeSeason !== 'all' && c.season !== activeSeason) continue;
        if (currentRarity    !== 'all' && c.rarity !== currentRarity) continue;
        if (currentType      !== 'all' && c.type   !== currentType)   continue;
        if (searchQ && !c.name.toLowerCase().includes(searchQ)) continue;
        const myCount    = getCount(c.src);
        const owned      = myCount > 0;
        const theirCount = isCompare ? (compareCards.get(c.src) || 0) : 0;

        // ownership filter (non-compare)
        if (!isCompare) {
          if (currentOwnership === 'owned'    && !owned)         continue;
          if (currentOwnership === 'unowned'  &&  owned)         continue;
          if (currentOwnership === 'wishlist' && !isWished(c.src)) continue;
        }

        // compare filter
        if (isCompare) {
          const iNeed    = theirCount > 0 && myCount === 0;
          const iOffer   = myCount > 1 && theirCount === 0;
          const bothHave = myCount > 0 && theirCount > 0;
          if (compareFilter === 'need'  && !iNeed)    continue;
          if (compareFilter === 'offer' && !iOffer)   continue;
          if (compareFilter === 'both'  && !bothHave) continue;
        }

        matchingCards.push(c);
      }

      for (const c of matchingCards) {
        const myCount    = getCount(c.src);
        const owned      = myCount > 0;
        const theirCount = isCompare ? (compareCards.get(c.src) || 0) : 0;

        const wrap = document.createElement('div');
        wrap.className = 'card-wrap' + (isCollView ? (owned ? ' owned' : ' unowned') : '');

        const img = document.createElement('img');
        img.src = c.src;
        img.className = 'card';
        wrap.appendChild(img);

        if (isCompare) {
          // Compare mode: show dual badge [me:N / them:N] with color coding
          const iNeed  = theirCount > 0 && myCount === 0;
          const iOffer = myCount > 1 && theirCount === 0;

          let cls = 'cmp-badge';
          if (iNeed)       cls += ' cmp-need';
          else if (iOffer) cls += ' cmp-offer';
          else if (myCount > 0 && theirCount > 0) cls += ' cmp-both';

          const badge = document.createElement('div');
          badge.className = cls;
          badge.innerHTML = `<span class="cmp-me">${myCount}</span><span class="cmp-sep">/</span><span class="cmp-them">${theirCount}</span>`;
          wrap.appendChild(badge);

          // bottom label for trade status
          if (iNeed || iOffer) {
            const tag = document.createElement('div');
            tag.className = 'cmp-tag ' + (iNeed ? 'cmp-tag-need' : 'cmp-tag-offer');
            tag.textContent = iNeed ? '필요' : '여분';
            wrap.appendChild(tag);
          }

          wrap.onclick = () => openModal(c);

        } else if (isCollView && isProfileView) {
          // Profile view: read-only with checkmark + count badge
          if (owned) {
            const mark = document.createElement('span');
            mark.className = 'owned-mark';
            mark.textContent = myCount > 1 ? '×' + myCount : '✓';
            wrap.appendChild(mark);
          }
          wrap.onclick = () => openModal(c);

        } else if (isCollView) {
          // Normal collection edit mode: count stepper badge [−][N][+]
          const badge = document.createElement('div');
          badge.className = 'count-badge';

          const dec = document.createElement('button');
          dec.className = 'cnt-btn';
          dec.textContent = '−';
          dec.onclick = e => {
            e.stopPropagation();
            const n = getCount(c.src);
            if (n <= 1) {
              ownedCards.delete(c.src);
              wrap.classList.replace('owned', 'unowned');
            } else {
              ownedCards.set(c.src, n - 1);
              num.textContent = n - 1;
            }
            saveOwned();
            updateProgress();
          };

          const num = document.createElement('span');
          num.className = 'cnt-num';
          num.textContent = myCount || '';

          const inc = document.createElement('button');
          inc.className = 'cnt-btn';
          inc.textContent = '+';
          inc.onclick = e => {
            e.stopPropagation();
            const n = getCount(c.src);
            const next = n + 1;
            ownedCards.set(c.src, next);
            num.textContent = next;
            if (!owned) {
              wrap.classList.replace('unowned', 'owned');
            }
            saveOwned();
            updateProgress();
          };

          badge.append(dec, num, inc);
          wrap.appendChild(badge);

          wrap.addEventListener('mouseenter', () => showHoverPreview(c, wrap));
          wrap.addEventListener('mouseleave', hideHoverPreview);
          wrap.onclick = () => {
            if (!isOwned(c.src)) {
              ownedCards.set(c.src, 1);
              wrap.classList.replace('unowned', 'owned');
              num.textContent = '1';
              saveOwned();
              updateProgress();
            }
          };

          // ⭐ wishlist star button on collection cards
          const starBtn = document.createElement('button');
          starBtn.className = 'wish-star-btn' + (isWished(c.src) ? ' wished' : '');
          starBtn.textContent = '⭐';
          starBtn.title = isWished(c.src) ? '위시리스트에서 제거' : '위시리스트에 추가';
          starBtn.onclick = e => {
            e.stopPropagation();
            if (isWished(c.src)) { wishlist.delete(c.src); } else { wishlist.add(c.src); }
            saveWishlist();
            starBtn.classList.toggle('wished');
          };
          wrap.appendChild(starBtn);
        } else {
          // Browse mode: click to open modal, right-click to wishlist
          wrap.onclick = () => openModal(c);
          wrap.addEventListener('contextmenu', e => {
            e.preventDefault();
            if (isWished(c.src)) { wishlist.delete(c.src); } else { wishlist.add(c.src); }
            saveWishlist();
            renderCards();
          });
          // Wishlist star badge
          if (isWished(c.src)) {
            const star = document.createElement('span');
            star.className = 'wish-badge';
            star.textContent = '⭐';
            wrap.appendChild(star);
          }
        }
        frag.appendChild(wrap);
      }

      grid.textContent = '';
      if (frag.childElementCount === 0) {
        const empty = document.createElement('p');
        empty.className = 'grid-empty';
        empty.textContent = searchQ ? `"${searchQ}" 검색 결과 없음` : '카드가 없습니다';
        grid.appendChild(empty);
      } else {
        grid.appendChild(frag);
      }
    }

    // ── Progress ────────────────────────────────────────────
    function buildProgress() {
      document.getElementById('collectionProgress').innerHTML =
        ['1','2','3','4'].map(s => {
          const total = CARDS.filter(c => c.season === s).length;
          const owned = CARDS.filter(c => c.season === s && isOwned(c.src)).length;
          const pct   = total ? Math.round(owned / total * 100) : 0;
          const medal = pct === 100 ? ' 🥇' : '';
          return `<div class="prog-item" id="prog-${s}">
            <div class="prog-label">시즌${s}${medal}</div>
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
            <div class="prog-count">${owned} / ${total}</div>
          </div>`;
        }).join('');
    }

    function updateProgress() {
      ['1','2','3','4'].forEach(s => {
        const total = CARDS.filter(c => c.season === s).length;
        const owned = CARDS.filter(c => c.season === s && isOwned(c.src)).length;
        const pct   = total ? Math.round(owned / total * 100) : 0;
        const item  = document.getElementById(`prog-${s}`);
        if (!item) return;
        item.querySelector('.prog-fill').style.width  = pct + '%';
        item.querySelector('.prog-count').textContent = `${owned} / ${total}`;
        item.querySelector('.prog-label').textContent = `시즌${s}${pct === 100 ? ' 🥇' : ''}`;
      });
    }

    // ── View switchers ──────────────────────────────────────
    function clearActive(sel) {
      document.querySelectorAll(sel).forEach(b => b.classList.remove('active'));
    }

    function hideSummary() {
      document.getElementById('summaryView').style.display = 'none';
      const btn = document.querySelector('.summary-tab-btn');
      if (btn) btn.classList.remove('active');
    }

    function hideCompareUI() {
      compareCards = null;
      compareFilter = 'all';
      document.getElementById('compareBanner').style.display  = 'none';
      document.getElementById('tradeSummary').style.display   = 'none';
      // Also clean up profile view if active
      if (isProfileView && _savedOwnedForProfile) {
        ownedCards = _savedOwnedForProfile;
        _savedOwnedForProfile = null;
      }
      isProfileView = false;
      profileCode = null;
      profileId   = null;
      document.getElementById('profileBanner').style.display = 'none';
    }

    function showOverview(btn) {
      viewMode = 'overview';
      hideSummary();
      hideCompareUI();
      clearActive('.top-left button');
      btn.classList.add('active');
      clearActive('.sidebar button');
      overview.style.display        = 'flex';
      grid.style.display            = 'none';
      sidebar.style.display         = '';
      sidebar.classList.add('disabled');
      document.getElementById('collTopBar').style.display    = 'none';

    // ── Encode / decode ─────────────────────────────────────
    // Format: 'i' + base64(2 bytes × index) when sparse (<27 owned)
    //         'b' + base64(bitmask)          when dense  (≥27 owned)
    // Crossover chosen so index mode is always shorter when it's used.
    // Old 72-char codes (no prefix) are still accepted.

    function b64(bytes) {
      return btoa(String.fromCharCode(...bytes)).replace(/=+$/, '');
    }
    function unb64(str) {
      const pad = (4 - str.length % 4) % 4;
      return [...atob(str + '='.repeat(pad))].map(c => c.charCodeAt(0));
    }

    function encodeCollection() {
      // 'c' format: 3 bytes per owned card — [idx_hi, idx_lo, count]
      const entries = [];
      CARDS.forEach((c, i) => {
        const n = getCount(c.src);
        if (n > 0) entries.push([i, n]);
      });
      const bytes = new Uint8Array(entries.length * 3);
      entries.forEach(([idx, n], i) => {
        bytes[i * 3]     = (idx >> 8) & 0xFF;
        bytes[i * 3 + 1] =  idx       & 0xFF;
        bytes[i * 3 + 2] =  n;
      });
      return 'c' + b64(bytes);
    }

    function decodeCollection(raw) {
      const code = raw.trim();
      const mode = code[0];
      const owned = new Map();

      if (mode === 'c') {
        const bytes = unb64(code.slice(1));
        for (let i = 0; i + 2 < bytes.length; i += 3) {
          const idx = (bytes[i] << 8) | bytes[i + 1];
          const cnt = bytes[i + 2];
          if (idx < CARDS.length && cnt > 0) owned.set(CARDS[idx].src, cnt);
        }
      } else if (mode === 'i') {
        // legacy index format (count=1)
        const bytes = unb64(code.slice(1));
        for (let i = 0; i + 1 < bytes.length; i += 2) {
          const idx = (bytes[i] << 8) | bytes[i + 1];
          if (idx < CARDS.length) owned.set(CARDS[idx].src, 1);
        }
      } else {
        // 'b' prefix or legacy 72-char code (no prefix), count=1
        const bytes = unb64(mode === 'b' ? code.slice(1) : code);
        CARDS.forEach((c, i) => {
          if (bytes[i >> 3] & (1 << (i & 7))) owned.set(c.src, 1);
        });
      }
      return owned;
    }

    function copyMissingList() {
      const RARITIES = ['UR','SR','R','N','SE'];
      const SEASONS  = ['1','2','3','4'];
      const lines    = [];
      SEASONS.forEach(s => {
        RARITIES.forEach(r => {
          const cards = CARDS.filter(c =>
            c.season === s &&
            (c.rarity === r || (r === 'SE' && c.rarity === 'SEC')) &&
            !isOwned(c.src)
          ).sort((a, b) => cardNum(a.src) - cardNum(b.src));
          if (cards.length === 0) return;
          lines.push(`[시즌${s} ${r}]`);
          cards.forEach(c => lines.push(`S${s}-${String(cardNum(c.src)).padStart(3,'0')} ${c.name}`));
        });
      });
      const fbId = document.getElementById('svCopyFeedback') ? 'svCopyFeedback' : 'copyFeedback2';
      if (lines.length === 0) { showFeedback(fbId, '미보유 카드 없음 ✓', 'feedback-ok'); return; }
      navigator.clipboard.writeText(lines.join('\n'))
        .then(() => showFeedback(fbId, '미보유 목록 복사됨! ✓', 'feedback-ok'))
        .catch(() => showFeedback(fbId, '복사 실패 (권한 거부)', 'feedback-err'));
    }

    // ── Create account ───────────────────────────────────────
    async function acctCreate() {
      const chosenId = document.getElementById('createId').value.trim().toLowerCase();
      const pin     = document.getElementById('createPin').value.trim();
      const confirm = document.getElementById('createPinConfirm').value.trim();
      const errEl   = document.getElementById('createError');
      errEl.textContent = '';

      if (!/^[a-z0-9]{3,16}$/.test(chosenId)) { errEl.textContent = 'ID는 영문/숫자 3~16자입니다'; return; }
      if (!/^\d{4}$/.test(pin)) { errEl.textContent = 'PIN은 숫자 4자리입니다'; return; }
      if (pin !== confirm)       { errEl.textContent = 'PIN이 일치하지 않습니다'; return; }

      try {
        const code = encodeCollection();
        const resp = await fetch('/api/collection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chosenId, code, pin }),
        });
        let data;
        try { data = await resp.json(); } catch { data = {}; }
        if (!resp.ok) { errEl.textContent = data.error || `서버 오류 (${resp.status})`; return; }

        localStorage.setItem(ACCT_ID_KEY, data.id);
        localStorage.setItem(ACCT_PIN_KEY, pin);
        hideAcctPanel();
        refreshAcctUI();
        setSyncStatus('saved');
        showFeedback('copyFeedback2', '계정 생성됨! ID: ' + data.id, 'feedback-ok');
      } catch (e) {
        errEl.textContent = '네트워크 오류 — 인터넷 연결을 확인하세요';
      }
    }

    // ── Login ────────────────────────────────────────────────
    async function acctLogin() {

      const pin   = document.getElementById('loginPin').value.trim();
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';

      if (!CLOUD_ID_RE.test(id)) { errEl.textContent = 'ID는 영문/숫자 3~16자입니다'; return; }
      if (!/^\d{4}$/.test(pin))  { errEl.textContent = 'PIN은 숫자 4자리입니다'; return; }

      try {
        const resp = await fetch('/api/collection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, pin, login: true }),
        });
        let data;
        try { data = await resp.json(); } catch { data = {}; }
        if (!resp.ok) { errEl.textContent = data.error || `서버 오류 (${resp.status})`; return; }

        // Load the cloud collection
        ownedCards = decodeCollection(data.code);
        saveOwned();
        localStorage.setItem(ACCT_ID_KEY, id);
        localStorage.setItem(ACCT_PIN_KEY, pin);
        hideAcctPanel();
        refreshAcctUI();
        buildProgress();
        renderCards();
        setSyncStatus('saved');
        showFeedback('copyFeedback2', '로그인 완료!', 'feedback-ok');

        errEl.textContent = '서버 오류, 다시 시도해주세요';
      }
    }

    // ── Auto-sync (debounced cloud save) ─────────────────────
    let _syncTimer  = null;
    let _syncing    = false;

    function setSyncStatus(state) {
      const el = document.getElementById('syncStatus');
      if (!el) return;
      if (state === 'saved')   { el.innerHTML = '동기화됨';   el.className = 'sync-status sync-ok'; }
      if (state === 'pending') { el.innerHTML = '저장 중…';   el.className = 'sync-status sync-pending'; }
      if (state === 'error')   {
        el.innerHTML = '동기화 실패 <button class="sync-retry-btn" onclick="doSync()">재시도</button>';
        el.className = 'sync-status sync-err';
      }
    }

    function scheduleSync() {
      if (!isLoggedIn()) return;
      setSyncStatus('pending');
      clearTimeout(_syncTimer);
      _syncTimer = setTimeout(doSync, 2000);
    }

    async function doSync() {
      if (_syncing || !isLoggedIn()) return;
      _syncing = true;
      try {
        const resp = await fetch('/api/collection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: getAcctId(), pin: getAcctPin(), code: encodeCollection() }),
        });
        if (!resp.ok) throw new Error();
        setSyncStatus('saved');
      } catch {
        setSyncStatus('error');
      } finally {
        _syncing = false;
      }
    }

    function clearAll() {
      if (!window.confirm('모든 보유 카드를 초기화하시겠습니까?')) return;
      ownedCards = new Map();
      saveOwned();
      buildProgress();
      renderCards();
      scheduleSync();
    }

    function importCode() {
      const input = document.getElementById('codeInput');
      if (!input.value.trim()) return;
      if (!window.confirm('현재 컬렉션을 덮어쓰시겠습니까?')) return;
      try {
        ownedCards = decodeCollection(input.value);
        saveOwned();
        input.value = '';
        hideCompareInput();
        buildProgress();
        renderCards();
        scheduleSync();
      } catch (e) {
        showFeedback('importFeedback', '잘못된 코드', 'feedback-err');
      }
    }

    // ── Profile view (viewing someone else's collection) ─────
    async function fetchCloudCode(id) {
      const resp = await fetch(`/api/collection?id=${id}`);
      if (!resp.ok) throw new Error('ID를 찾을 수 없습니다');
      const { code } = await resp.json();
      return code;
    }

    let _savedOwnedForProfile = null;

    async function enterProfileView(id) {
      const banner = document.getElementById('profileBanner');
      if (banner) { banner.style.display = 'flex'; document.getElementById('profileLabel').textContent = '불러오는 중…'; }
      try {
        profileCode = await fetchCloudCode(id);
        profileId   = id;
        isProfileView = true;
        // Save user's own cards, swap in the profile's collection for rendering
        _savedOwnedForProfile = new Map(ownedCards);
        ownedCards = decodeCollection(profileCode);
        document.getElementById('profileLabel').textContent = `${id} 의 컬렉션`;
        document.getElementById('profileBanner').style.display = 'flex';
        showCollection(document.querySelector('.collection-tab'));
      } catch {
        if (banner) banner.style.display = 'none';
        history.replaceState(null, '', location.pathname);
        alert('해당 ID를 찾을 수 없습니다');
      }
    }

    function compareWithProfile() {
      if (!profileCode || !_savedOwnedForProfile) return;
      // Restore own collection, then compare against profile
      ownedCards = _savedOwnedForProfile;
      _savedOwnedForProfile = null;
      isProfileView = false;
      document.getElementById('profileBanner').style.display = 'none';
      try {
        compareCards = decodeCollection(profileCode);
        compareFilter = 'all';
        document.getElementById('compareBanner').style.display = 'flex';
        document.getElementById('tradeSummary').style.display = 'flex';
        updateCompareStats();
        buildTradeSummary();
      } catch {}
      renderCards();
      profileCode = null;
      profileId   = null;
    }

    function exitProfile() {
      // Restore own collection
      if (_savedOwnedForProfile) {
        ownedCards = _savedOwnedForProfile;
        _savedOwnedForProfile = null;
      }
      isProfileView = false;
      profileCode = null;
      profileId   = null;
      document.getElementById('profileBanner').style.display = 'none';
      history.replaceState(null, '', location.pathname);
      renderCards();
    }

    // ── Compare mode ─────────────────────────────────────────
    async function startCompare() {

      const val   = input.value.trim();
      if (!val) return;

      let code = val;
      if (CLOUD_ID_RE.test(val)) {

    const COMPARE_FILTERS = [
      { key: 'all',   label: '전체 보기' },
      { key: 'need',  label: '내가 필요한 것' },
      { key: 'offer', label: '내 여분 (교환 가능)' },
      { key: 'both',  label: '둘 다 보유' },
    ];

    function cycleCompareFilter() {
      const idx = COMPARE_FILTERS.findIndex(f => f.key === compareFilter);
      const next = COMPARE_FILTERS[(idx + 1) % COMPARE_FILTERS.length];
      compareFilter = next.key;
      document.getElementById('compareFilterBtn').textContent = next.label;
      renderCards();
    }

    function updateCompareStats() {
      let iNeed = 0, iOffer = 0, bothHave = 0;
      for (const c of CARDS) {
        const my    = getCount(c.src);
        const their = compareCards.get(c.src) || 0;
        if (their > 0 && my === 0) iNeed++;
        if (my > 1 && their === 0) iOffer++;
        if (my > 0 && their > 0)   bothHave++;
      }
      document.getElementById('compareStats').innerHTML =
        `<span class="cstat cstat-need">필요 ${iNeed}</span>` +
        `<span class="cstat cstat-offer">여분 ${iOffer}</span>` +
        `<span class="cstat cstat-both">공통 ${bothHave}</span>`;
    }

    function buildTradeSummary() {
      const need = [], offer = [];
      const rarityOrder = { SE: 0, UR: 1, SR: 2, R: 3, N: 4 };
      for (const c of CARDS) {
        const my    = getCount(c.src);
        const their = compareCards.get(c.src) || 0;
        if (their > 0 && my === 0)
          need.push({ card: c, theirCount: their });
        if (my > 1 && their === 0)
          offer.push({ card: c, extra: my - 1 });
      }

      const byRarity = (a, b) => (rarityOrder[a.card.rarity] ?? 9) - (rarityOrder[b.card.rarity] ?? 9);
      need.sort(byRarity);
      offer.sort(byRarity);

      const needEl = document.getElementById('tradeNeed');
      if (need.length === 0) {
        needEl.innerHTML = '<p class="trade-empty">상대방이 가진 카드 중 필요한 것이 없습니다</p>';
      } else {
        needEl.innerHTML = need.map(({ card: c, theirCount }) =>
          `<div class="trade-card trade-card-need" onclick="openModal(CARDS.find(x=>x.src==='${c.src}'))">
            <img src="${c.src}" loading="lazy" />
            <div class="trade-card-info">
              <span class="trade-rarity">${c.rarity}</span>
              <span class="trade-name">${c.name}</span>
              ${theirCount > 1 ? `<span class="trade-extra">×${theirCount}</span>` : ''}
            </div>
          </div>`
        ).join('');
      }

      const offerEl = document.getElementById('tradeOffer');
      if (offer.length === 0) {
        offerEl.innerHTML = '<p class="trade-empty">교환 가능한 여분 카드가 없습니다</p>';
      } else {
        offerEl.innerHTML = offer.map(({ card: c, extra }) =>
          `<div class="trade-card trade-card-offer" onclick="openModal(CARDS.find(x=>x.src==='${c.src}'))">
            <img src="${c.src}" loading="lazy" />
            <div class="trade-card-info">
              <span class="trade-rarity">${c.rarity}</span>
              <span class="trade-name">${c.name}</span>
              <span class="trade-extra">여분 ×${extra}</span>
            </div>
          </div>`
        ).join('');
      }

      const matchSection = document.getElementById('tradeMatchSection');
      const matchEl = document.getElementById('tradeMatches');
      const TRADEABLE = new Set(['UR', 'SR']);
      if (need.length > 0 && offer.length > 0) {
        const matches = [];
        const usedNeed = new Set(), usedOffer = new Set();
        for (let ni = 0; ni < need.length && matches.length < 10; ni++) {
          if (usedNeed.has(ni)) continue;
          if (!TRADEABLE.has(need[ni].card.rarity)) continue;
          for (let oi = 0; oi < offer.length && matches.length < 10; oi++) {
            if (usedOffer.has(oi)) continue;
            if (need[ni].card.rarity !== offer[oi].card.rarity) continue;
            matches.push({ get: need[ni].card, give: offer[oi].card });
            usedNeed.add(ni);
            usedOffer.add(oi);
            break;
          }
        }
        if (matches.length > 0) {
          matchSection.style.display = '';
          matchEl.innerHTML = matches.map(({ get, give }) =>
            `<div class="trade-match-row">
              <div class="trade-match-card give" onclick="openModal(CARDS.find(x=>x.src==='${give.src}'))">
                <img src="${give.src}" loading="lazy" />
                <span class="trade-rarity">${give.rarity}</span>
                <span class="trade-name">${give.name}</span>
              </div>

          hideCompareInput();

      const hash = location.hash;
      if (hash.startsWith('#u=')) {
        enterProfileView(hash.slice(3));
      } else if (hash.startsWith('#cmp=')) {
        // Auto-enter compare mode with partner ID
        const partnerId = hash.slice(5);
        if (CLOUD_ID_RE.test(partnerId)) {
          cmpPartnerId = partnerId;
          showCollection(document.querySelector('.collection-tab'));
          fetchCloudCode(partnerId).then(code => {
            compareCards = decodeCollection(code);
            compareFilter = 'all';
            document.getElementById('compareBanner').style.display = 'flex';
            document.getElementById('tradeSummary').style.display = 'flex';
            updateCompareStats();
            buildTradeSummary();
            renderCards();
          }).catch(() => { history.replaceState(null, '', location.pathname); });
        }
      } else if (hash.startsWith('#c=')) {
        // Legacy code links — show as compare
        try {
          compareCards = decodeCollection(hash.slice(3));
          compareFilter = 'all';
          showCollection(document.querySelector('.collection-tab'));

    // ── Summary view ────────────────────────────────────────
    function cardNum(src) {
      const m = src.match(/_(\d+)\.(png|jpg)$/i);
      return m ? parseInt(m[1], 10) : 0;
    }

    function showSummary() {
      if (viewMode === 'summary') { showCollectionCards(); return; }
      viewMode = 'summary';
      hideCompareUI();
      clearActive('.top-left button');
      document.querySelector('.collection-tab').classList.add('active');
      document.querySelector('.summary-tab-btn').classList.add('active');

    function setSummaryTemplate(t) {
      summaryTemplate = t;
      localStorage.setItem('zc_sv_tpl', t);
      renderSummary();
    }

    function renderSummary() {
      const el = document.getElementById('summaryView');
      el.style.display = 'block';

      const RARITIES = ['UR','SR','R','N','SE'];
      const RC = { UR:'#b8860b', SR:'#7b5ea7', R:'#1565c0', N:'#555', SE:'#ad1457' };
      const SEASONS  = ['1','2','3','4'];
      const SEASON_COLORS = { '1':'#5c6bc0','2':'#26a69a','3':'#ef6c00','4':'#8d6e63' };

      // ── Global stats ──
      const totalCards  = CARDS.length;
      const ownedUnique = CARDS.filter(c => isOwned(c.src)).length;
      const totalCopies = [...ownedCards.values()].reduce((a, b) => a + b, 0);
      const duplicates  = totalCopies - ownedUnique;
      const pct         = Math.round(ownedUnique / totalCards * 100);

      // ── Per-season rarity breakdown (stat table) ──
      const seasonTable = SEASONS.map(s => {
        const sc = CARDS.filter(c => c.season === s);
        const rows = RARITIES.map(r => {
          const total = sc.filter(c => c.rarity === r || (r === 'SE' && c.rarity === 'SEC')).length;
          if (total === 0) return null;
          const owned = sc.filter(c => (c.rarity === r || (r === 'SE' && c.rarity === 'SEC')) && isOwned(c.src)).length;
          const rPct  = Math.round(owned / total * 100);
          const bar   = `<span class="sv-bar"><span class="sv-bar-fill" style="width:${rPct}%;background:${RC[r]}"></span></span>`;
          return `<tr>
            <td><span class="sv-rarity" style="color:${RC[r]}">${r}</span></td>
            <td class="sv-frac">${owned}<span class="sv-total">/${total}</span></td>
            <td>${bar}</td>
            <td class="sv-pct ${rPct === 100 ? 'sv-complete' : ''}">${rPct}%</td>
          </tr>`;
        }).filter(Boolean).join('');
        const sOwned = sc.filter(c => isOwned(c.src)).length;
        const sPct   = Math.round(sOwned / sc.length * 100);
        return `<div class="sv-season-block">
          <div class="sv-season-head">
            <span class="sv-season-label">시즌 ${s}</span>
            <span class="sv-season-frac">${sOwned} / ${sc.length}</span>
            <span class="sv-season-pct ${sPct === 100 ? 'sv-complete' : ''}">${sPct}%</span>
          </div>
          <table class="sv-table"><tbody>${rows}</tbody></table>
        </div>`;
      }).join('');

      // ── Unified card list: season → rarity, owned colored, unowned greyed ──
      const unifiedGrid = SEASONS.map(s => {
        const sc = CARDS.filter(c => c.season === s);
        const rarityGroups = RARITIES.map(r => {
          const cards = sc
            .filter(c => c.rarity === r || (r === 'SE' && c.rarity === 'SEC'))
            .sort((a, b) => cardNum(a.src) - cardNum(b.src));
          if (cards.length === 0) return '';
          const chips = cards.map(c => {
            const owned = isOwned(c.src);
            const cnt   = getCount(c.src);
            const n     = cardNum(c.src);
            const label = `S${s}-${String(n).padStart(3,'0')}${cnt > 1 ? ` ×${cnt}` : ''}`;
            if (owned) {
              const col = cnt > 1 ? '#e65100' : (RC[r] || '#999');
              const cls = cnt > 1 ? 'sv-chip sv-chip-dup' : 'sv-chip';
              return `<span class="${cls}" style="border-color:${col}" title="${c.name}">${label}</span>`;
            }
            return `<span class="sv-chip sv-chip-unowned" title="${c.name}">${label}</span>`;
          }).join('');
          return `<div class="sv-unified-rarity">
            <span class="sv-rarity sv-unified-r" style="color:${RC[r]}">${r}</span>
            <div class="sv-chips">${chips}</div>
          </div>`;
        }).filter(Boolean).join('');
        const sOwned = sc.filter(c => isOwned(c.src)).length;
        return `<div class="sv-chip-group">
          <div class="sv-chip-season">시즌 ${s} <span class="sv-season-frac">${sOwned} / ${sc.length}</span></div>
          ${rarityGroups}
        </div>`;
      }).join('');

      // ── Minimal template: compact text table ──
      const minimalGrid = SEASONS.map(s => {
        const sc = CARDS.filter(c => c.season === s);
        const rows = RARITIES.map(r => {
          const cards = sc
            .filter(c => c.rarity === r || (r === 'SE' && c.rarity === 'SEC'))
            .sort((a, b) => cardNum(a.src) - cardNum(b.src));
          if (!cards.length) return '';
          return cards.map(c => {
            const owned = isOwned(c.src);
            const cnt   = getCount(c.src);
            const n     = cardNum(c.src);

              <td class="mn-name">${c.name}</td>
              <td class="mn-cnt">${owned ? (cnt > 1 ? `×${cnt}` : '✓') : '—'}</td>

        const sOwned = sc.filter(c => isOwned(c.src)).length;
        return `<div class="mn-season">
          <div class="mn-season-head">시즌 ${s} <span class="mn-frac">${sOwned} / ${sc.length}</span></div>
          <table class="mn-table"><tbody>${rows}</tbody></table>
        </div>`;
      }).join('');

      // ── Season card template: big visual blocks ──
      const seasonCards = SEASONS.map(s => {
        const sc     = CARDS.filter(c => c.season === s);
        const sOwned = sc.filter(c => isOwned(c.src)).length;
        const sPct   = Math.round(sOwned / sc.length * 100);
        const rarityRows = RARITIES.map(r => {
          const total = sc.filter(c => c.rarity === r || (r === 'SE' && c.rarity === 'SEC')).length;
          if (!total) return '';
          const owned = sc.filter(c => (c.rarity === r || (r === 'SE' && c.rarity === 'SEC')) && isOwned(c.src)).length;
          const rPct  = Math.round(owned / total * 100);
          return `<div class="sc-rarity-row">
            <span class="sc-r-label" style="color:${RC[r]}">${r}</span>
            <div class="sc-r-bar-wrap"><div class="sc-r-bar" style="width:${rPct}%;background:${RC[r]}"></div></div>
            <span class="sc-r-frac">${owned}/${total}</span>
          </div>`;
        }).join('');
        return `<div class="sc-card">
          <div class="sc-top">
            <span class="sc-season-num">시즌 ${s}</span>
            <span class="sc-pct ${sPct===100?'sv-complete':''}">${sPct}%</span>
          </div>
          <div class="sc-big-num">${sOwned}<span class="sc-big-den"> / ${sc.length}</span></div>
          <div class="sc-bar-wrap"><div class="sc-bar" style="width:${sPct}%"></div></div>
          <div class="sc-rarities">${rarityRows}</div>
        </div>`;
      }).join('');

      // ── Duplicates ──
      let dupSection = '';
      const dups = CARDS.filter(c => getCount(c.src) > 1)
        .sort((a, b) => (b.rarity < a.rarity ? -1 : 1) || cardNum(a.src) - cardNum(b.src));
      if (dups.length > 0) {
        const dupItems = dups.map(c => `<div class="sv-dup-row">
            <span class="sv-rarity" style="color:${RC[c.rarity] || '#999'}">${c.rarity}</span>
            <span class="sv-dup-id">S${c.season}-${String(cardNum(c.src)).padStart(3,'0')}</span>
            <span class="sv-dup-name">${c.name}</span>
            <span class="sv-dup-cnt">×${getCount(c.src)}</span>
          </div>`).join('');
        dupSection = `<section class="sv-section">
          <h2 class="sv-section-title">여분 카드 <span class="sv-badge">${dups.length}종</span></h2>
          <div class="sv-dup-list">${dupItems}</div>
        </section>`;
      }

      // ── 도감 template: tiny colored squares ──
      const dogamGrid = SEASONS.map(s => {
        const sc = CARDS.filter(c => c.season === s);
        const squares = sc.map(c => {
          const owned = isOwned(c.src);
          const cnt   = getCount(c.src);
          const col   = owned ? (RC[c.rarity] || '#999') : 'transparent';
          const border = owned ? col : '#ddd';
          const title = `${c.name} (${c.rarity})${cnt > 1 ? ' ×'+cnt : ''}`;
          return `<span class="dg-sq ${owned?'dg-owned':''}" style="background:${col};border-color:${border}" title="${title}"></span>`;
        }).join('');
        const sOwned = sc.filter(c => isOwned(c.src)).length;
        const sPct   = Math.round(sOwned / sc.length * 100);
        return `<div class="dg-season">
          <div class="dg-head">
            <span class="dg-label" style="color:${SEASON_COLORS[s]}">시즌 ${s}</span>
            <span class="dg-frac">${sOwned}/${sc.length}</span>
            <span class="dg-pct ${sPct===100?'sv-complete':''}">${sPct}%</span>
          </div>
          <div class="dg-grid">${squares}</div>
        </div>`;
      }).join('');

      // ── 트레이더 template: offer / need split ──
      const traderOffer = [], traderNeed = [];
      const RARITY_ORDER = { UR:0, SR:1, R:2, N:3, SE:4, SEC:4 };
      CARDS.forEach(c => {
        const cnt = getCount(c.src);
        if (cnt > 1) traderOffer.push(c);
        else if (cnt === 0) traderNeed.push(c);
      });
      traderOffer.sort((a,b) => (RARITY_ORDER[a.rarity]??9)-(RARITY_ORDER[b.rarity]??9) || cardNum(a.src)-cardNum(b.src));
      traderNeed.sort((a,b)  => (RARITY_ORDER[a.rarity]??9)-(RARITY_ORDER[b.rarity]??9) || cardNum(a.src)-cardNum(b.src));
      const traderChips = (arr, isOffer) => RARITIES.map(r => {
        const cards = arr.filter(c => c.rarity === r || (r==='SE' && c.rarity==='SEC'));
        if (!cards.length) return '';
        const chips = cards.map(c => {
          const n = cardNum(c.src); const cnt = getCount(c.src);
          const label = `S${c.season}-${String(n).padStart(3,'0')}${cnt>1?` ×${cnt}`:''}`;
          return `<span class="sv-chip ${isOffer?'td-offer-chip':'td-need-chip'}" style="border-color:${RC[r]}" title="${c.name}">${label}</span>`;
        }).join('');
        return `<div class="sv-unified-rarity">
          <span class="sv-rarity sv-unified-r" style="color:${RC[r]}">${r}</span>
          <div class="sv-chips">${chips}</div>

      const traderSection = `

          <div class="td-col">
            <div class="td-col-head td-col-offer">줄 수 있어요 <span class="sv-badge">${traderOffer.length}</span></div>
            ${traderOffer.length ? traderChips(traderOffer, true) : '<p class="sv-empty">여분 없음</p>'}
          </div>
          <div class="td-col">
            <div class="td-col-head td-col-need">필요해요 <span class="sv-badge sv-badge-miss">${traderNeed.length}</span></div>
            ${traderNeed.length ? traderChips(traderNeed, false) : '<p class="sv-empty">미보유 없음 🎉</p>'}
          </div>
        </div>`;

      // ── 희귀도별 template: rarity-first ──
      const rarityFirst = RARITIES.map(r => {
        const allCards = CARDS.filter(c => c.rarity === r || (r==='SE' && c.rarity==='SEC'));
        if (!allCards.length) return '';
        const total  = allCards.length;
        const owned  = allCards.filter(c => isOwned(c.src)).length;
        const rPct   = Math.round(owned/total*100);
        const bySeason = SEASONS.map(s => {
          const sc = allCards.filter(c => c.season === s).sort((a,b) => cardNum(a.src)-cardNum(b.src));
          if (!sc.length) return '';
          const chips = sc.map(c => {
            const o = isOwned(c.src); const cnt = getCount(c.src); const n = cardNum(c.src);
            const label = `S${s}-${String(n).padStart(3,'0')}${cnt>1?` ×${cnt}`:''}`;
            const col = o ? (cnt>1?'#e65100':RC[r]) : 'transparent';
            const cls = o ? (cnt>1?'sv-chip sv-chip-dup':'sv-chip') : 'sv-chip sv-chip-unowned';
            return `<span class="${cls}" style="border-color:${o?(cnt>1?'#e65100':RC[r]):'rgba(0,0,0,0.12)'}" title="${c.name}">${label}</span>`;
          }).join('');
          return `<div class="rf-season-row"><span class="rf-s-label" style="color:${SEASON_COLORS[s]}">S${s}</span><div class="sv-chips">${chips}</div></div>`;
        }).join('');
        return `<div class="rf-block">
          <div class="rf-head">
            <span class="rf-r-big" style="color:${RC[r]}">${r}</span>
            <div class="rf-bar-wrap"><div class="rf-bar" style="width:${rPct}%;background:${RC[r]}"></div></div>
            <span class="rf-frac">${owned} / ${total}</span>
            <span class="rf-pct ${rPct===100?'sv-complete':''}">${rPct}%</span>
          </div>
          <div class="rf-seasons">${bySeason}</div>
        </div>`;
      }).join('');

      const missing = CARDS.filter(c => !isOwned(c.src));

      // ── Ring SVG for hero ──
      const R2 = 54, CX = 64, CY = 64, STROKE = 10;
      const circumference = 2 * Math.PI * R2;
      const dash = (circumference * pct / 100).toFixed(1);

      el.innerHTML = `
        <div class="sv-wrap">
          <div class="sv-back-row">
            <button class="sv-back-btn" onclick="showCollectionCards()">← 카드로 돌아가기</button>
            <div class="sv-template-picker">
              <button class="sv-tpl-btn ${summaryTemplate==='default'?'active':''}" onclick="setSummaryTemplate('default')" title="기본">기본</button>
              <button class="sv-tpl-btn ${summaryTemplate==='minimal'?'active':''}" onclick="setSummaryTemplate('minimal')" title="미니멀">미니멀</button>
              <button class="sv-tpl-btn ${summaryTemplate==='season'?'active':''}" onclick="setSummaryTemplate('season')" title="시즌 카드">시즌</button>
              <button class="sv-tpl-btn ${summaryTemplate==='dogam'?'active':''}" onclick="setSummaryTemplate('dogam')" title="도감">도감</button>
              <button class="sv-tpl-btn ${summaryTemplate==='trader'?'active':''}" onclick="setSummaryTemplate('trader')" title="트레이더">트레이더</button>
              <button class="sv-tpl-btn ${summaryTemplate==='rarity'?'active':''}" onclick="setSummaryTemplate('rarity')" title="희귀도별">희귀도</button>
            </div>
          </div>

          <header class="sv-header">
            <div class="sv-ring-wrap">
              <svg class="sv-ring-svg" viewBox="0 0 128 128">
                <circle cx="${CX}" cy="${CY}" r="${R2}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="${STROKE}"/>
                <circle cx="${CX}" cy="${CY}" r="${R2}" fill="none" stroke="#69f0ae" stroke-width="${STROKE}"
                  stroke-dasharray="${dash} ${circumference.toFixed(1)}"
                  stroke-linecap="round" transform="rotate(-90 ${CX} ${CY})"/>
                <text x="${CX}" y="${CY}" text-anchor="middle" dominant-baseline="central"
                  fill="#fff" font-size="22" font-weight="900" font-family="sans-serif">${pct}%</text>
              </svg>
            </div>
            <div class="sv-header-mid">
              <div class="sv-hero-num-row">
                <span class="sv-hero-num">${ownedUnique}</span>
                <span class="sv-hero-den"> / ${totalCards}</span>
              </div>
              <div class="sv-hero-label">보유 카드</div>
              <div class="sv-stat-row">
                <div class="sv-stat-pill">${totalCopies}<small>총 보유</small></div>
                ${duplicates > 0 ? `<div class="sv-stat-pill sv-stat-dup">${duplicates}<small>여분</small></div>` : ''}
                ${missing.length > 0 ? `<div class="sv-stat-pill sv-stat-miss">${missing.length}<small>미보유</small></div>` : '<div class="sv-stat-pill sv-stat-done">완성!<small>🎉</small></div>'}
              </div>
            </div>
            <div class="sv-season-mini">
              ${SEASONS.map(s => {
                const sc = CARDS.filter(c => c.season === s);
                const so = sc.filter(c => isOwned(c.src)).length;
                const sp = Math.round(so/sc.length*100);
                return `<div class="sv-smini">
                  <div class="sv-smini-label" style="color:${SEASON_COLORS[s]}">S${s}</div>
                  <div class="sv-smini-bar-wrap"><div class="sv-smini-bar" style="width:${sp}%;background:${SEASON_COLORS[s]}"></div></div>
                  <div class="sv-smini-pct ${sp===100?'sv-complete':''}">${sp}%</div>
                </div>`;
              }).join('')}
            </div>
            <div class="sv-hero-actions">
              <button class="sv-link-btn" onclick="printCollection()">🖨 PDF</button>
              <button class="sv-link-btn" onclick="copyMissingList()">📋 미보유 복사</button>
              <button class="sv-link-btn" onclick="generateStatsImage()">🖼 이미지</button>
              <span id="svCopyFeedback" style="font-size:11px"></span>
            </div>
          </header>

          ${summaryTemplate === 'default' ? `
            <section class="sv-section sv-section-grid">
              <h2 class="sv-section-title">시즌별 수집 현황</h2>
              <div class="sv-season-grid">${seasonTable}</div>
            </section>
            <section class="sv-section">
              <h2 class="sv-section-title">카드 목록 <span class="sv-badge" style="background:#2e7d32">${ownedUnique} 보유</span>${missing.length?`<span class="sv-badge sv-badge-miss">${missing.length} 미보유</span>`:''}</h2>
              <div class="sv-legend">
                <span class="sv-chip" style="border-color:#b8860b">UR 보유</span>
                <span class="sv-chip sv-chip-dup" style="border-color:#e65100">여분 ×N</span>
                <span class="sv-chip sv-chip-unowned">미보유</span>
              </div>
              ${unifiedGrid}
            </section>
            ${dupSection}
          ` : summaryTemplate === 'minimal' ? `
            <section class="sv-section">
              <h2 class="sv-section-title">전체 카드 목록</h2>
              ${minimalGrid}
            </section>
            ${dupSection}
          ` : summaryTemplate === 'season' ? `
            <div class="sc-grid">${seasonCards}</div>
          ` : summaryTemplate === 'dogam' ? `
            <section class="sv-section">
              <h2 class="sv-section-title">도감</h2>
              <div class="sv-legend">
                ${RARITIES.map(r=>`<span class="dg-legend-sq" style="background:${RC[r]};border-color:${RC[r]}"></span><span style="font-size:11px;color:${RC[r]};font-weight:700;margin-right:8px">${r}</span>`).join('')}
                <span class="dg-legend-sq" style="background:transparent;border-color:#ddd;border-style:dashed"></span><span style="font-size:11px;color:#bbb;margin-right:8px">미보유</span>
              </div>
              ${dogamGrid}
            </section>
          ` : summaryTemplate === 'trader' ? `
            <section class="sv-section">
              <h2 class="sv-section-title">트레이드 현황</h2>
              ${traderSection}
            </section>
          ` : `
            <section class="sv-section">
              <h2 class="sv-section-title">희귀도별 현황</h2>
              ${rarityFirst}
            </section>
          `}

          ${missing.length === 0 ? '<p class="sv-complete-msg" style="text-align:center;padding:20px 0">모든 카드를 보유하고 있습니다! 🎉</p>' : ''}

        </div>`;
    }

    // ── Modal ───────────────────────────────────────────────
    function openModal(c) {
      _currentModalSrc = c.src;
      document.getElementById('cardModal').style.display = 'flex';
      document.getElementById('modalImage').src = c.src;
      const rows = [
        ['이름', c.name], ['등급', c.rarity], ['종류', c.typelabel],
        ['속성', c.attribute], ['크로노스', c.chronos], ['공격력', c.power],
        ['파워코스트', c.powercost], ['센드 투 파워', c.sendtopower], ['효과', c.effect],
      ];
      document.getElementById('modalBody').innerHTML = rows
        .filter(([, v]) => v && v.trim())
        .map(([label, val]) => `<tr><th>${label}</th><td>${val}</td></tr>`)
        .join('');
      // Likes section
      _likeCount = 0;
      document.getElementById('likeBtn').className = 'like-btn';
      document.getElementById('likeCount').textContent = '…';
      fetchLikeCount(c.src);
    }

    function closeModal(e) {
      if (e.target.id === 'cardModal') {
        e.target.style.display = 'none';
        _currentModalSrc = null;
      }
    }

    // ── Likes system ─────────────────────────────────────────
    let _likeCount = 0; // tracks current displayed count

    async function fetchLikeCount(src) {
      try {
        const resp = await fetch('/api/likes?card=' + encodeURIComponent(src));
        if (!resp.ok) return;
        const { count } = await resp.json();
        // Only overwrite if user hasn't clicked yet (count still shows '…' or 0)
        if (_currentModalSrc === src && _likeCount === 0) {
          _likeCount = count;
          document.getElementById('likeCount').textContent = count;
        }
      } catch {}
    }

    async function likeCard() {
      const src = _currentModalSrc;
      if (!src) return;

      // 1s cooldown per click — prevents double-fire but allows repeated likes
      const lsKey = 'zc_lk_' + src;
      const ts = parseInt(localStorage.getItem(lsKey) || '0', 10);
      if (Date.now() - ts < 1000) return;
      localStorage.setItem(lsKey, String(Date.now()));

      // Optimistic: increment immediately
      _likeCount += 1;
      document.getElementById('likeCount').textContent = _likeCount;

      const btn = document.getElementById('likeBtn');
      btn.classList.add('liked', 'bump');
      btn.addEventListener('animationend', () => btn.classList.remove('bump'), { once: true });

      // Fire and forget — sync count from server response
      fetch('/api/likes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ card: src }),
      }).then(r => r.ok ? r.json() : null).then(data => {
        if (data && _currentModalSrc === src) {
          _likeCount = data.count;
          document.getElementById('likeCount').textContent = data.count;
        }
      }).catch(() => {});
    }

    async function showLikesRanking() {
      document.getElementById('likesRanking').style.display = 'flex';
      document.getElementById('likesRankList').innerHTML = '<p style="color:#aaa;text-align:center">불러오는 중…</p>';
      try {
        const resp = await fetch('/api/likes?top=10');
        if (!resp.ok) throw new Error();
        const list = await resp.json();
        if (!list.length) {
          document.getElementById('likesRankList').innerHTML = '<p style="color:#aaa;text-align:center">아직 좋아요가 없습니다</p>';
          return;
        }
        const medals = ['gold','silver','bronze'];
        document.getElementById('likesRankList').innerHTML = list.map((item, i) => {
          const card = CARDS.find(c => c.src === item.src);
          const name = card ? card.name : item.src;
          const numCls = medals[i] || '';
          return `<div class="likes-rank-row">
            <span class="likes-rank-num ${numCls}">${i+1}</span>
            <img class="likes-rank-img" src="${item.src}" alt="${name}">
            <span class="likes-rank-name">${name}</span>
            <span class="likes-rank-count">❤️ ${item.count}</span>
          </div>`;
        }).join('');
      } catch {
        document.getElementById('likesRankList').innerHTML = '<p style="color:#c62828;text-align:center">불러오기 실패</p>';
      }
    }

    // ── Canvas stats image ────────────────────────────────────
    function generateStatsImage() {
      const W = 900, H = 500;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, '#1a1a2e');
      grad.addColorStop(1, '#263248');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Title
      ctx.fillStyle = '#e0e0ff';
      ctx.font = 'bold 32px sans-serif';
      ctx.fillText('ZUTOMAYO CARD 컬렉션', 48, 60);

      // Date
      const date = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = '16px sans-serif';
      ctx.fillText(date, 48, 90);

      // Total stat
      const totalCards  = CARDS.length;
      const ownedUnique = CARDS.filter(c => isOwned(c.src)).length;
      const pct = Math.round(ownedUnique / totalCards * 100);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 80px sans-serif';
      ctx.fillText(ownedUnique, 48, 190);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = 'bold 36px sans-serif';
      ctx.fillText(' / ' + totalCards, 48 + ctx.measureText(String(ownedUnique)).width + 4, 190);
      ctx.fillStyle = '#69f0ae';
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText(pct + '%', 48, 220);

      // Season bars
      const SEASON_COLORS = ['#42a5f5','#66bb6a','#ffa726','#ab47bc'];
      const barX = 48, barW = W - 96, barH = 22, barGap = 44;
      const startY = 280;
      ['1','2','3','4'].forEach((s, i) => {
        const sc  = CARDS.filter(c => c.season === s);
        const own = sc.filter(c => isOwned(c.src)).length;
        const p   = sc.length ? own / sc.length : 0;
        const y   = startY + i * barGap;

        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText('시즌' + s, barX, y + 15);

        const lx = barX + 54;
        const bw = barW - 160;
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.beginPath(); ctx.roundRect(lx, y, bw, barH, 4); ctx.fill();
        ctx.fillStyle = SEASON_COLORS[i];
        ctx.beginPath(); ctx.roundRect(lx, y, Math.max(bw * p, 4), barH, 4); ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '13px sans-serif';
        ctx.fillText(`${own} / ${sc.length}  (${Math.round(p*100)}%)`, lx + bw + 12, y + 15);
      });

      // Download
      const a = document.createElement('a');
      a.download = 'zutomayo-card-collection.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

  </script>

</body>
