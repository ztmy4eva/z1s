<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ZUTOMAYO CARD </title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 상단 바 -->
  <header class="top-bar">
    <div class="seasons">
      <button onclick="filterSeason('1')">시즌1</button>
      <button onclick="filterSeason('1')">시즌2</button>
      <button onclick="filterSeason('1')">시즌3</button>
      <button onclick="filterSeason('1')">시즌4</button>
    </div>

    <input type="text" placeholder="카드 검색" />
  </header>

  <div class="container">

    <!-- 왼쪽 필터 -->
    <aside class="sidebar">
      <h3>전체</h3>

      <h4>캐릭터 카드</h4>
      <ul>
        <button onclick="filterRarity('UR')">UR</button>
        <button onclick="filterRarity('UR')">SR</button>
        <button onclick="filterRarity('UR')">R</button>
        <button onclick="filterRarity('UR')">N</button>
        <button onclick="filterRarity('UR')">SE</button>
      </ul>

      <h4>인챈트 카드</h4>
      <ul>
        <button onclick="filterRarity('UR')">UR</button>
        <button onclick="filterRarity('UR')">SR</button>
        <button onclick="filterRarity('UR')">R</button>
        <button onclick="filterRarity('UR')">N</button>
      </ul>
    </aside>

    <!-- 카드 영역 -->
    <main class="card-grid">
      <img src="cards/zutomayocard_1st_1.png" class="card" data-season="1" data-rarity="UR" />
      <img src="cards/zutomayocard_1st_2.png" class="card" data-season="2" data-rarity="SR" />
      <img src="cards/zutomayocard_1st_3.png" class="card" data-season="3" data-rarity="R" />
      <img src="cards/zutomayocard_1st_4.png" class="card" data-season="4" data-rarity="N" />
    </main>

  </div>

</body>
</html>
<script>
  function filterSeason(season) {
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      if (season === 'all' || card.dataset.season === season) {
        card.style.display = 'inline-block';
      } else {
        card.style.display = 'none';
      }
    });
  }

  function filterRarity(rarity) {
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      if (rarity === 'all' || card.dataset.rarity === rarity) {
        card.style.display = 'inline-block';
      } else {
        card.style.display = 'none';
      }
    });
  }
</script>
