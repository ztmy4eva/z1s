        data-power="밤 : 140 / 낮 : 80"
        data-powercost="♦︎♦︎♦︎♦︎♦︎♦︎"
        data-sendtopower="♦︎ × 0"
        data-effect=" " 
      />










    </main>

  </div>


<script>
  let currentSeason = 'all';
  let currentRarity = 'all';
  let currentType = 'all'; // character | enchant | all


function applyFilter() {
  const cards = document.querySelectorAll('.card');

  cards.forEach(card => {
    const matchSeason =
      currentSeason === 'all' || card.dataset.season === currentSeason;

    const matchRarity =
      currentRarity === 'all' || card.dataset.rarity === currentRarity;

    const matchType =
      currentType === 'all' || card.dataset.type === currentType;

    card.style.display =
      matchSeason && matchRarity && matchType
        ? 'inline-block'
        : 'none';
  });
}


  function clearActive(groupSelector) {
    document
      .querySelectorAll(groupSelector)
      .forEach(btn => btn.classList.remove('active'));
  }

  // ✅ 시즌: 무조건 선택
  function filterSeason(season, button) {
    currentSeason = season;
    clearActive('.seasons button');
    button.classList.add('active');
    applyFilter();
  }

  // ✅ 등급: 토글
  function filterRarity(rarity, button) {
    if (button.classList.contains('active')) {
      button.classList.remove('active');
      currentRarity = 'all';
    } else {
      clearActive('.sidebar button');
      button.classList.add('active');
      currentRarity = rarity;
    }
    applyFilter();
  }

  function filterType(type, button) {
  if (button.classList.contains('active')) {
    button.classList.remove('active');
    currentType = 'all';
  } else {
    clearActive('.sidebar .type-button');
    button.classList.add('active');
    currentType = type;
  }
  applyFilter();
}

</script>

<!-- 카드 확대 모달 -->
<div id="cardModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">

    <img id="modalImage" />

    <div class="modal-info">
      <table>
        <tr><th>이름</th><td id="info-name"></td></tr>
        <tr><th>등급</th><td id="info-rarity"></td> </tr>
        <tr><th>종류</th><td id="info-typelabel"></td> </tr>
        <tr><th>속성</th><td id="info-attribute"></td></tr>
        <tr><th>크로노스</th><td id="info-chronos"></td></tr>
        <tr><th>공격력</th><td id="info-power"></td></tr>
        <tr><th>파워코스트</th><td id="info-powercost"></td></tr>
        <tr><th>센드 투 파워</th><td id="info-sendtopower"></td></tr>
        <tr><th>효과</th><td id="info-effect"></td></tr>
      </table>
    </div>

  </div>
</div>

  <script>

  function setInfo(id, value) {
  const cell = document.getElementById(id);
  if (!cell) return;

  const row = cell.closest('tr');

  if (value) {
    cell.textContent = value;
    row.style.display = '';
  } else {
    row.style.display = 'none';
  }
}    
    
function openModal(card) {
  document.getElementById('cardModal').style.display = 'flex';
  document.getElementById('modalImage').src = card.src;

  setInfo('info-name', card.dataset.name);
  setInfo('info-rarity', card.dataset.rarity);
  setInfo('info-typelabel', card.dataset.typelabel);
  setInfo('info-attribute', card.dataset.attribute);
  setInfo('info-chronos', card.dataset.chronos);
  setInfo('info-power', card.dataset.power);
  setInfo('info-powercost', card.dataset.powercost);
  setInfo('info-sendtopower', card.dataset.sendtopower);
  setInfo('info-effect', card.dataset.effect);
}


function closeModal(e) {
  if (e.target.id === 'cardModal') {
    e.target.style.display = 'none';
  }
}
</script>

  
  </body>
</html>
