<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ZUTOMAYO CARD </title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 상단 바 -->
  <header class="top-bar">
    <div class="seasons">
      <button>시즌1</button>
      <button>시즌2</button>
      <button>시즌3</button>
      <button>시즌4</button>
    </div>

    <input type="text" placeholder="카드 검색" />
  </header>

  <div class="container">

    <!-- 왼쪽 필터 -->
    <aside class="sidebar">
      <h3>전체</h3>

      <h4>캐릭터 카드</h4>
      <ul>
        <li>UR</li>
        <li>SR</li>
        <li>R</li>
        <li>N</li>
        <li>SE</li>
      </ul>

      <h4>인챈트 카드</h4>
      <ul>
        <li>UR</li>
        <li>SR</li>
        <li>R</li>
        <li>N</li>
      </ul>
    </aside>

    <!-- 카드 영역 -->
    <main class="card-grid">
      <img src="cards/zutomayocard_1st_1.png" class="card" data-season="1" data-rarity="UR" />
      <img src="cards/zutomayocard_1st_2.png" class="card" data-season="2" data-rarity="SR" />
      <img src="cards/zutomayocard_1st_3.png" class="card" data-season="3" data-rarity="R" />
      <img src="cards/zutomayocard_1st_4.png" class="card" data-season="4" data-rarity="N" />
    </main>

  </div>

</body>
</html>
