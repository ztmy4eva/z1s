<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ZUTOMAYO CARD 한글 번역 </title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-bar">
    <div class="top-left">
      <button onclick="showOverview(this)" class="active">개요</button>
      <button onclick="showSeason('1', this)">시즌1</button>
      <button onclick="showSeason('2', this)">시즌2</button>
      <button onclick="showSeason('3', this)">시즌3</button>
      <button onclick="showSeason('4', this)">시즌4</button>
      <button class="collection-tab" onclick="showCollection(this)">컬렉션</button>
      <button onclick="showPrices(this)">가격</button>
      <a class="buy-btn" href="https://zutomayomart.net/product/list?tag_codes=ZMT-T-014" target="_blank" rel="noopener">즛카드 구매</a>
      <!-- Progress + save code (collection mode only) -->
      <div id="collTopBar" style="display:none">
        <div class="collection-progress" id="collectionProgress"></div>
        <div class="save-code-bar">
          <button class="code-btn" onclick="copyCode()">코드 복사</button>
          <button class="code-btn" onclick="shareLink()">링크 복사</button>
          <span id="copyFeedback"></span>
          <div class="import-wrap">
            <button class="code-btn" onclick="toggleImport()">코드 입력</button>
            <div id="importArea" style="display:none">
              <input id="codeInput" type="text" spellcheck="false" placeholder="저장 코드 붙여넣기" />
              <button class="code-btn apply-btn" onclick="applyCode()">적용</button>
              <span id="importFeedback"></span>
            </div>
          </div>
          <button class="code-btn print-btn" onclick="printCollection()">PDF 출력</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Shared collection banner -->
  <div id="sharedBanner" style="display:none">
    <span class="shared-label">공유된 컬렉션을 보는 중입니다 (읽기 전용)</span>
    <div class="shared-actions">
      <button class="code-btn apply-btn" onclick="importShared()">내 컬렉션으로 가져오기</button>
      <button class="code-btn" onclick="exitSharedView()">내 컬렉션으로 돌아가기</button>
    </div>
  </div>

  <div class="container">

    <aside class="sidebar disabled" id="sidebar">
      <!-- Collection season picker (collection mode only, at top) -->
      <div id="collSeasonNav" style="display:none">
        <h3>시즌</h3>
        <button class="coll-season-btn" onclick="setCollectionSeason('1', this)">시즌1</button>
        <button class="coll-season-btn" onclick="setCollectionSeason('2', this)">시즌2</button>
        <button class="coll-season-btn" onclick="setCollectionSeason('3', this)">시즌3</button>
        <button class="coll-season-btn" onclick="setCollectionSeason('4', this)">시즌4</button>
        <hr />
      </div>
      <!-- Ownership filter (collection mode only) -->
      <div id="ownership-section" style="display:none">
        <h3>보유 여부</h3>
        <button class="ownership-btn" id="own-btn-owned"   onclick="filterOwnership('owned', this)">보유</button>
        <button class="ownership-btn" id="own-btn-unowned" onclick="filterOwnership('unowned', this)">미보유</button>
        <hr />
      </div>
      <h3>카드 종류</h3>
      <button class="type-btn" onclick="filterType('character', this)">캐릭터 카드</button>
      <button class="type-btn" onclick="filterType('enchant', this)">인챈트 카드</button>
      <button class="type-btn" onclick="filterType('area-enchant', this)">에어리어 인챈트 카드</button>
      <hr />
      <h3>등급</h3>
      <button class="rarity-btn" onclick="filterRarity('UR', this)">UR</button>
      <button class="rarity-btn" onclick="filterRarity('SR', this)">SR</button>
      <button class="rarity-btn" onclick="filterRarity('R', this)">R</button>
      <button class="rarity-btn" onclick="filterRarity('N', this)">N</button>
      <button class="rarity-btn" onclick="filterRarity('SE', this)">SE</button>
    </aside>

      <div class="main-area">
        <div id="overview">
          <img src="cards/zc123.png" class="overview-image">
        </div>
        <main class="card-grid" id="cardGrid"></main>
      </div>

  </div>

  <!-- Price view — full width, outside sidebar layout -->
  <div id="priceView" style="display:none">
    <div class="price-header">
      <div class="price-header-top">
        <div>
          <h2 class="price-title">메르카리 시세</h2>
          <p class="price-subtitle">메르카리 재팬 실거래 데이터 기반 · 황색 테두리 = 개별 데이터, 그 외 = 등급 평균</p>
        </div>
        <div class="rarity-price-grid" id="rarityPriceGrid"></div>
      </div>
      <div class="price-filters">
        <div class="price-filter-group">
          <span class="filter-label">시즌</span>
          <button class="price-filter-btn active" onclick="setPriceSeason('all',this)">전체</button>
          <button class="price-filter-btn" onclick="setPriceSeason('1',this)">시즌1</button>
          <button class="price-filter-btn" onclick="setPriceSeason('2',this)">시즌2</button>
          <button class="price-filter-btn" onclick="setPriceSeason('3',this)">시즌3</button>
          <button class="price-filter-btn" onclick="setPriceSeason('4',this)">시즌4</button>
        </div>
        <div class="price-filter-group">
          <span class="filter-label">등급</span>
          <button class="price-filter-btn active" onclick="setPriceRarity('all',this)">전체</button>
          <button class="price-filter-btn" onclick="setPriceRarity('UR',this)">UR</button>
          <button class="price-filter-btn" onclick="setPriceRarity('SR',this)">SR</button>
          <button class="price-filter-btn" onclick="setPriceRarity('R',this)">R</button>
          <button class="price-filter-btn" onclick="setPriceRarity('N',this)">N</button>
          <button class="price-filter-btn" onclick="setPriceRarity('SEC',this)">SE</button>
        </div>
        <div class="price-filter-group">
          <span class="filter-label">데이터</span>
          <button class="price-filter-btn active" onclick="setPriceData('all',this)">전체</button>
          <button class="price-filter-btn" onclick="setPriceData('specific',this)">개별 데이터</button>
          <button class="price-filter-btn" onclick="setPriceData('fallback',this)">등급 평균</button>
        </div>
      </div>
    </div>
    <div class="price-grid-wrap">
      <div id="priceGrid" class="price-grid"></div>
    </div>
  </div>

  <!-- 모달 -->
  <div id="cardModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content">
      <img id="modalImage" />
      <div class="modal-info">
        <table class="card-table">
          <tbody id="modalBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="cards.js"></script>
  <script src="prices.js"></script>
  <script>
    let viewMode         = 'overview';
    let currentSeason    = 'all';
    let collSeason       = '1';
    let currentRarity    = 'all';
    let currentType      = 'all';
    let currentOwnership = 'all';
    let isSharedView     = false;
    let savedOwnedCards  = null;
    let priceSeason      = 'all';
    let priceRarity      = 'all';
    let priceData        = 'all';

    let ownedCards = new Set(JSON.parse(localStorage.getItem('zc_owned') || '[]'));

    function saveOwned() {
      localStorage.setItem('zc_owned', JSON.stringify([...ownedCards]));
    }
    function toggleOwned(src) {
      if (ownedCards.has(src)) ownedCards.delete(src);
      else ownedCards.add(src);
      saveOwned();
    }

    const grid      = document.getElementById('cardGrid');
    const sidebar   = document.getElementById('sidebar');
    const overview  = document.getElementById('overview');
    const priceView = document.getElementById('priceView');

    // ── Render ─────────────────────────────────────────────
    function renderCards() {
      const isCollView   = viewMode === 'collection';
      const activeSeason = isCollView ? collSeason : currentSeason;
      const frag = document.createDocumentFragment();

      for (const c of CARDS) {
        if (activeSeason !== 'all' && c.season !== activeSeason) continue;
        if (currentRarity    !== 'all' && c.rarity !== currentRarity) continue;
        if (currentType      !== 'all' && c.type   !== currentType)   continue;
        const isOwned = ownedCards.has(c.src);
        if (currentOwnership === 'owned'   && !isOwned) continue;
        if (currentOwnership === 'unowned' &&  isOwned) continue;

        const wrap = document.createElement('div');
        wrap.className = 'card-wrap' + (isCollView ? (isOwned ? ' owned' : ' unowned') : '');

        const img = document.createElement('img');
        img.src = c.src;
        img.className = 'card';
        wrap.appendChild(img);

        if (isCollView && !isSharedView) {
          // own collection: click to toggle
          const mark = document.createElement('span');
          mark.className = 'owned-mark';
          mark.textContent = '✓';
          wrap.appendChild(mark);
          wrap.onclick = () => {
            toggleOwned(c.src);
            const now = ownedCards.has(c.src);
            wrap.classList.toggle('owned',   now);
            wrap.classList.toggle('unowned', !now);
            updateProgress();
          };
        } else if (isCollView && isSharedView) {
          // shared view: click opens modal (read-only)
          const mark = document.createElement('span');
          mark.className = 'owned-mark';
          mark.textContent = '✓';
          wrap.appendChild(mark);
          wrap.onclick = () => openModal(c);
        } else {
          wrap.onclick = () => openModal(c);
        }
        frag.appendChild(wrap);
      }

      grid.textContent = '';
      grid.appendChild(frag);
    }

    // ── Progress ────────────────────────────────────────────
    function buildProgress() {
      document.getElementById('collectionProgress').innerHTML =
        ['1','2','3','4'].map(s => {
          const total = CARDS.filter(c => c.season === s).length;
          const owned = CARDS.filter(c => c.season === s && ownedCards.has(c.src)).length;
          const pct   = total ? Math.round(owned / total * 100) : 0;
          return `<div class="prog-item" id="prog-${s}">
            <div class="prog-label">시즌${s}</div>
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
            <div class="prog-count">${owned} / ${total}</div>
          </div>`;
        }).join('');
    }

    function updateProgress() {
      ['1','2','3','4'].forEach(s => {
        const total = CARDS.filter(c => c.season === s).length;
        const owned = CARDS.filter(c => c.season === s && ownedCards.has(c.src)).length;
        const pct   = total ? Math.round(owned / total * 100) : 0;
        const item  = document.getElementById(`prog-${s}`);
        if (!item) return;
        item.querySelector('.prog-fill').style.width  = pct + '%';
        item.querySelector('.prog-count').textContent = `${owned} / ${total}`;
      });
    }

    // ── View switchers ──────────────────────────────────────
    function clearActive(sel) {
      document.querySelectorAll(sel).forEach(b => b.classList.remove('active'));
    }

    function showOverview(btn) {
      viewMode = 'overview';
      clearActive('.top-left button');
      btn.classList.add('active');
      clearActive('.sidebar button');
      overview.style.display   = 'flex';
      grid.style.display       = 'none';
      priceView.style.display  = 'none';
      sidebar.style.display    = '';
      sidebar.classList.add('disabled');
      document.getElementById('collTopBar').style.display    = 'none';
      document.getElementById('collSeasonNav').style.display = 'none';
      setOwnershipVisibility(false);
      currentSeason = currentRarity = currentType = currentOwnership = 'all';
    }

    function showSeason(season, btn) {
      viewMode = 'browse';
      clearActive('.top-left button');
      btn.classList.add('active');
      overview.style.display  = 'none';
      priceView.style.display = 'none';
      grid.style.display      = 'grid';
      sidebar.style.display   = '';
      sidebar.classList.remove('disabled');
      document.getElementById('collTopBar').style.display    = 'none';
      document.getElementById('collSeasonNav').style.display = 'none';
      setOwnershipVisibility(false);
      currentSeason = season;
      renderCards();
    }

    function showCollection(btn) {
      viewMode = 'collection';
      priceView.style.display = 'none';
      sidebar.style.display   = '';
      clearActive('.top-left button');
      btn.classList.add('active');
      clearActive('.sidebar .rarity-btn');
      clearActive('.sidebar .type-btn');
      document.querySelectorAll('.ownership-btn').forEach(b => b.classList.remove('active'));
      currentRarity = currentType = currentOwnership = 'all';
      overview.style.display = 'none';
      grid.style.display     = 'grid';
      sidebar.classList.remove('disabled');
      document.getElementById('collTopBar').style.display    = 'flex';
      document.getElementById('collSeasonNav').style.display = 'block';
      clearActive('.coll-season-btn');
      document.querySelector('.coll-season-btn').classList.add('active');
      collSeason = '1';
      setOwnershipVisibility(true);
      buildProgress();
      renderCards();
    }

    function setCollectionSeason(s, btn) {
      collSeason = s;
      clearActive('.coll-season-btn');
      btn.classList.add('active');
      renderCards();
    }

    // ── Sidebar filters ─────────────────────────────────────
    function setOwnershipVisibility(show) {
      document.getElementById('ownership-section').style.display = show ? '' : 'none';
    }

    function filterRarity(rarity, btn) {
      if (btn.classList.contains('active')) { btn.classList.remove('active'); currentRarity = 'all'; }
      else { clearActive('.sidebar .rarity-btn'); btn.classList.add('active'); currentRarity = rarity; }
      renderCards();
    }
    function filterType(type, btn) {
      if (btn.classList.contains('active')) { btn.classList.remove('active'); currentType = 'all'; }
      else { clearActive('.sidebar .type-btn'); btn.classList.add('active'); currentType = type; }
      renderCards();
    }
    function filterOwnership(val, btn) {
      if (btn.classList.contains('active')) { btn.classList.remove('active'); currentOwnership = 'all'; }
      else { clearActive('.sidebar .ownership-btn'); btn.classList.add('active'); currentOwnership = val; }
      renderCards();
    }

    // ── Encode / decode ─────────────────────────────────────
    // Format: 'i' + base64(2 bytes × index) when sparse (<27 owned)
    //         'b' + base64(bitmask)          when dense  (≥27 owned)
    // Crossover chosen so index mode is always shorter when it's used.
    // Old 72-char codes (no prefix) are still accepted.

    function b64(bytes) {
      return btoa(String.fromCharCode(...bytes)).replace(/=+$/, '');
    }
    function unb64(str) {
      const pad = (4 - str.length % 4) % 4;
      return [...atob(str + '='.repeat(pad))].map(c => c.charCodeAt(0));
    }

    function encodeCollection() {
      const indices = [];
      CARDS.forEach((c, i) => { if (ownedCards.has(c.src)) indices.push(i); });

      if (indices.length < 27) {
        // index mode — 2 bytes per card, much shorter for sparse collections
        const bytes = new Uint8Array(indices.length * 2);
        indices.forEach((idx, i) => {
          bytes[i * 2]     = (idx >> 8) & 0xFF;
          bytes[i * 2 + 1] =  idx       & 0xFF;
        });
        return 'i' + b64(bytes);
      } else {
        // bitmask mode
        const bytes = new Uint8Array(Math.ceil(CARDS.length / 8));
        CARDS.forEach((c, i) => {
          if (ownedCards.has(c.src)) bytes[i >> 3] |= (1 << (i & 7));
        });
        return 'b' + b64(bytes);
      }
    }

    function decodeCollection(raw) {
      const code  = raw.trim();
      const mode  = code[0];
      const owned = new Set();

      if (mode === 'i') {
        const bytes = unb64(code.slice(1));
        for (let i = 0; i + 1 < bytes.length; i += 2) {
          const idx = (bytes[i] << 8) | bytes[i + 1];
          if (idx < CARDS.length) owned.add(CARDS[idx].src);
        }
      } else {
        // 'b' prefix or legacy 72-char code (no prefix)
        const bytes = unb64(mode === 'b' ? code.slice(1) : code);
        CARDS.forEach((c, i) => {
          if (bytes[i >> 3] & (1 << (i & 7))) owned.add(c.src);
        });
      }
      return owned;
    }

    // ── Save code buttons ───────────────────────────────────
    function showFeedback(id, text, cls) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = cls;
      setTimeout(() => { el.textContent = ''; el.className = ''; }, 2000);
    }

    function copyCode() {
      navigator.clipboard.writeText(encodeCollection())
        .then(() => showFeedback('copyFeedback', '코드 복사됨! ✓', 'feedback-ok'));
    }

    function shareLink() {
      const url = location.href.split('#')[0] + '#c=' + encodeCollection();
      navigator.clipboard.writeText(url)
        .then(() => showFeedback('copyFeedback', '링크 복사됨! ✓', 'feedback-ok'));
    }

    function toggleImport() {
      const area = document.getElementById('importArea');
      const open = area.style.display === 'none';
      area.style.display = open ? 'flex' : 'none';
      if (open) document.getElementById('codeInput').focus();
    }

    function applyCode() {
      const input = document.getElementById('codeInput');
      try {
        ownedCards = decodeCollection(input.value);
        saveOwned();
        input.value = '';
        document.getElementById('importArea').style.display = 'none';
        buildProgress();
        renderCards();
      } catch (e) {
        showFeedback('importFeedback', '잘못된 코드', 'feedback-err');
      }
    }

    // ── Shared view ─────────────────────────────────────────
    function enterSharedView(code) {
      try {
        savedOwnedCards = new Set(ownedCards);
        ownedCards = decodeCollection(code);
        isSharedView = true;
        document.getElementById('sharedBanner').style.display = 'flex';
        showCollection(document.querySelector('.collection-tab'));
      } catch (e) {
        history.replaceState(null, '', location.pathname);
      }
    }

    function importShared() {
      // keep shared collection as own
      saveOwned();
      savedOwnedCards = null;
      isSharedView = false;
      document.getElementById('sharedBanner').style.display = 'none';
      history.replaceState(null, '', location.pathname);
      buildProgress();
      renderCards();
    }

    function exitSharedView() {
      ownedCards = savedOwnedCards;
      savedOwnedCards = null;
      isSharedView = false;
      document.getElementById('sharedBanner').style.display = 'none';
      history.replaceState(null, '', location.pathname);
      buildProgress();
      renderCards();
    }

    // ── On load: check for shared link ──────────────────────
    window.addEventListener('load', () => {
      document.getElementById('codeInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') applyCode();
      });
      const hash = location.hash;
      if (hash.startsWith('#c=')) enterSharedView(hash.slice(3));
    });

    // ── Print / PDF ─────────────────────────────────────────
    function printCollection() {
      const baseUrl    = location.href.split('#')[0].replace(/\/[^/]*$/, '/');
      const totalAll   = CARDS.length;
      const totalOwned = CARDS.filter(c => ownedCards.has(c.src)).length;
      const totalPct   = Math.round(totalOwned / totalAll * 100);
      const date       = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });

      const rarityColor = { UR:'#b8860b', SR:'#7b5ea7', R:'#1565c0', N:'#555', SE:'#ad1457' };

      const seasonBlocks = ['1','2','3','4'].map(s => {
        const seasonCards = CARDS.filter(c => c.season === s);
        const ownedN      = seasonCards.filter(c => ownedCards.has(c.src)).length;
        const pct         = Math.round(ownedN / seasonCards.length * 100);

        const slots = seasonCards.map(c => {
          const have  = ownedCards.has(c.src);
          const color = rarityColor[c.rarity] || '#555';
          return `
            <div class="slot ${have ? 'have' : 'miss'}">
              <div class="img-wrap">
                <img src="${baseUrl}${c.src}" />
                ${have ? '<div class="check">✓</div>' : ''}
              </div>
              <div class="label">
                <span class="rbadge" style="color:${color}">${c.rarity}</span>
                <span class="kname">${c.name}</span>
              </div>
            </div>`;
        }).join('');

        return `
          <section class="card-page">
            <div class="season-header">
              <span class="season-title">시즌 ${s}</span>
              <span class="season-stat">${ownedN} / ${seasonCards.length} 보유 &nbsp;·&nbsp; ${pct}%</span>
            </div>
            <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
            <div class="card-grid">${slots}</div>
          </section>`;
      }).join('');

      // summary cover page
      const summaryRows = ['1','2','3','4'].map(s => {
        const sc    = CARDS.filter(c => c.season === s);
        const own   = sc.filter(c => ownedCards.has(c.src)).length;
        const pct   = Math.round(own / sc.length * 100);
        return `
          <div class="sum-row">
            <span class="sum-label">시즌 ${s}</span>
            <div class="sum-bar-wrap">
              <div class="sum-bar-fill" style="width:${pct}%"></div>
            </div>
            <span class="sum-count">${own} <span class="sum-total">/ ${sc.length}</span></span>
            <span class="sum-pct">${pct}%</span>
          </div>`;
      }).join('');

      const html = `<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"/>
<base href="${baseUrl}"/>
<title>ズトマヨカード コレクション</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    color: #111; background: #fff;
  }

  /* ── Cover page ── */
  .cover {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 60px 80px;
    page-break-after: always; break-after: page;
  }
  .cover-top { text-align: center; margin-bottom: 56px; }
  .title-jp  { font-size: 38px; font-weight: 900; color: #1a1a2e; letter-spacing: 0.08em; }
  .title-kr  { font-size: 16px; color: #888; margin-top: 8px; letter-spacing: 0.04em; }
  .cover-date { font-size: 13px; color: #bbb; margin-top: 10px; }

  .total-block { margin-bottom: 52px; text-align: center; }
  .total-num  { font-size: 64px; font-weight: 900; color: #1a1a2e; line-height: 1; }
  .total-denom{ font-size: 28px; color: #aaa; font-weight: 400; }
  .total-label{ font-size: 14px; color: #888; margin-top: 6px; letter-spacing: 0.05em; }
  .total-pct  { display: inline-block; margin-top: 12px; background: #1a1a2e; color: #e0e0ff;
                padding: 6px 24px; border-radius: 20px; font-size: 18px; font-weight: bold; }

  .sum-section { width: 100%; max-width: 520px; }
  .sum-row {
    display: grid; grid-template-columns: 56px 1fr 70px 42px;
    align-items: center; gap: 12px; margin-bottom: 18px;
  }
  .sum-label { font-size: 14px; font-weight: 700; color: #1a1a2e; }
  .sum-bar-wrap { height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
  .sum-bar-fill { height: 100%; background: #2e7d32; border-radius: 6px; }

  /* ── Card pages ── */

    // ── Price tab ───────────────────────────────────────────
    function buildRarityPriceGrid() {
      const rarityMeta = [
        { r:'N',   label:'N',  color:'#555' },
        { r:'R',   label:'R',  color:'#1565c0' },
        { r:'SR',  label:'SR', color:'#7b5ea7' },
        { r:'UR',  label:'UR', color:'#b8860b' },
        { r:'SEC', label:'SE', color:'#ad1457' },
      ];
      document.getElementById('rarityPriceGrid').innerHTML = rarityMeta.map(({ r, label, color }) => {
        const p = (typeof RARITY_PRICES !== 'undefined' && RARITY_PRICES[r]) || {};
        const buy  = p.buy  ? '¥' + p.buy.toLocaleString()  : '—';
        const sell = p.sell ? '¥' + p.sell.toLocaleString() : '—';
        return `<div class="rarity-price-card">
          <span class="rp-badge" style="color:${color}">${label}</span>
          <div class="rp-row"><span class="rp-label">매입</span><span class="rp-buy">${buy}</span></div>
          <div class="rp-row"><span class="rp-label">판매</span><span class="rp-sell">${sell}</span></div>
        </div>`;
      }).join('');
    }

    function cardPrice(c) {
      if (typeof CARD_PRICES !== 'undefined' && CARD_PRICES[c.src])
        return { ...CARD_PRICES[c.src], specific: true };
      if (typeof RARITY_PRICES !== 'undefined' && RARITY_PRICES[c.rarity])
        return { ...RARITY_PRICES[c.rarity], specific: false };
      return { buy: 0, sell: 0, specific: false };
    }

    function renderPriceCards() {
      const frag = document.createDocumentFragment();
      for (const c of CARDS) {
        if (priceSeason !== 'all' && c.season !== priceSeason) continue;
        if (priceRarity !== 'all' && c.rarity !== priceRarity) continue;
        const p = cardPrice(c);
        if (priceData === 'specific' && !p.specific) continue;
        if (priceData === 'fallback'  &&  p.specific) continue;

        const buy  = p.buy  ? '¥' + p.buy.toLocaleString()  : '—';
        const sell = p.sell ? '¥' + p.sell.toLocaleString() : '—';

        const wrap = document.createElement('div');
        wrap.className = 'price-card' + (p.specific ? ' price-specific' : '');
        wrap.onclick = () => openModal(c);
        wrap.innerHTML = `
          <div class="price-card-img"><img src="${c.src}" loading="lazy"></div>
          <div class="price-card-info">
            <div class="price-card-name">${c.name}</div>
            <div class="price-card-prices">
              <span class="pc-buy">매입 ${buy}</span>
              <span class="pc-sell">판매 ${sell}</span>
            </div>
          </div>`;
        frag.appendChild(wrap);
      }
      const pg = document.getElementById('priceGrid');
      pg.textContent = '';
      pg.appendChild(frag);
    }

    function showPrices(btn) {
      viewMode = 'prices';
      clearActive('.top-left button');
      btn.classList.add('active');
      overview.style.display  = 'none';
      grid.style.display      = 'none';
      priceView.style.display = 'flex';
      sidebar.style.display   = 'none';
      document.getElementById('collTopBar').style.display    = 'none';
      document.getElementById('collSeasonNav').style.display = 'none';
      setOwnershipVisibility(false);
      buildRarityPriceGrid();
      renderPriceCards();
    }

    function setPriceSeason(s, btn) {
      priceSeason = s;
      document.querySelectorAll('.price-filter-group:nth-child(1) .price-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPriceCards();
    }

    function setPriceRarity(r, btn) {
      priceRarity = r;
      document.querySelectorAll('.price-filter-group:nth-child(2) .price-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPriceCards();
    }

    function setPriceData(d, btn) {
      priceData = d;
      document.querySelectorAll('.price-filter-group:nth-child(3) .price-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPriceCards();
    }

    // ── Modal ───────────────────────────────────────────────
    function openModal(c) {
      document.getElementById('cardModal').style.display = 'flex';
      document.getElementById('modalImage').src = c.src;
      const rows = [
        ['이름', c.name], ['등급', c.rarity], ['종류', c.typelabel],
        ['속성', c.attribute], ['크로노스', c.chronos], ['공격력', c.power],
        ['파워코스트', c.powercost], ['센드 투 파워', c.sendtopower], ['효과', c.effect],
      ];
      document.getElementById('modalBody').innerHTML = rows
        .filter(([, v]) => v && v.trim())
        .map(([label, val]) => `<tr><th>${label}</th><td>${val}</td></tr>`)
        .join('');
    }

    function closeModal(e) {
      if (e.target.id === 'cardModal') e.target.style.display = 'none';
    }
  </script>
